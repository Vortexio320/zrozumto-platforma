version: '3.8'

services:
  web:
    build: .
    container_name: zrozumto-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./temp_ingest:/app/temp_ingest # Persist temp folder if needed, or mapping for debug
    environment:
      - WATCHFILES_FORCE_POLLING=true
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_AUTH=${NEO4J_AUTH}
    depends_on:
      - neo4j

  neo4j:
    image: neo4j:5
    container_name: zrozumto-neo4j
    restart: always
    ports:
      - "127.0.0.1:7474:7474"  # HTTP (Neo4j Browser – dla Nginx proxy)
      - "127.0.0.1:7688:7687"  # Bolt (driver)
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH}
    volumes:
      - neo4j_data:/data

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=n8n.zrozum-to.pl
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.zrozum-to.pl/
      - GENERIC_TIMEZONE=Europe/Warsaw
      - NODE_OPTIONS=--max-old-space-size=1024
      - EXECUTIONS_PROCESS=main
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
  neo4j_data:


